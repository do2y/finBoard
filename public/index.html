<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>finBoard</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-gray-100">
    <div class="flex items-center justify-center h-screen">
      <div class="bg-white p-8 rounded-2xl shadow-lg w-98">
        <h1 class="text-2xl font-bold text-center mb-2">finBoard</h1>
        <p class="text-gray-500 text-center mb-6">자산 흐름을 기록하세요</p>

        <input
          id="email"
          class="w-full p-3 border rounded-lg mb-3"
          placeholder="이메일"
        />

        <input
          id="password"
          type="password"
          class="w-full p-3 border rounded-lg mb-4"
          placeholder="비밀번호"
        />

        <button
          onclick="login()"
          class="w-full bg-blue-500 text-white py-3 rounded-lg hover:bg-blue-600 mb-6"
        >
          로그인
        </button>

        <div class="text-center text-sm text-gray-600">
          계정이 없으신가요?
          <a
            href="signup.html"
            class="text-blue-500 font-semibold hover:underline"
            >회원가입</a
          >
        </div>
      </div>
    </div>

    <script>
      async function login() {
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        try {
          const response = await fetch("/api/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password }),
          });

          const result = await response.json();

          if (response.ok) {
            localStorage.setItem("token", result.token);
            localStorage.setItem("userName", result.name);
            alert(result.message);
            location.href = "dashboard.html";
          } else {
            alert(result.message);
          }
        } catch (error) {
          alert("서버 연결 실패");
        }
      }
    </script>
  </body>
</html>
