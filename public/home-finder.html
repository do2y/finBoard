<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>finBoard - Home Finder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <style>
      :root {
        --primary: #1f6fff;
        --dark: #0f172a;
        --bg: #f8fafc;
      }

      body {
        font-family: "Plus Jakarta Sans", "Noto Sans KR", sans-serif;
        background-color: var(--bg);
        color: var(--dark);
      }

      .bento-card {
        background: white;
        border: 1px solid #f1f5f9;
        border-radius: 2.5rem;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .bento-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.05);
      }

      .btn-gradient {
        background: linear-gradient(135deg, #1f6fff 0%, #3b82f6 100%);
      }

      #map {
        border-radius: 2rem;
        z-index: 10;
      }

      /* 지도 커스텀 마커 스타일 */
      .leaflet-div-icon {
        background: transparent !important;
        border: none !important;
      }
      .marker-chip {
        background: var(--primary);
        color: white;
        padding: 5px 12px;
        border-radius: 12px;
        font-weight: 800;
        font-size: 11px;
        box-shadow: 0 4px 12px rgba(31, 111, 255, 0.3);
        white-space: nowrap;
      }
    </style>
  </head>
  <body class="min-h-screen pb-12">
    <nav class="sticky top-0 z-50 px-6 py-4">
      <div
        class="mx-auto flex max-w-7xl items-center justify-between rounded-3xl border border-white/70 bg-white/80 px-6 py-4 shadow-lg shadow-sky-100 backdrop-blur-xl"
      >
        <div class="flex items-center gap-2">
          <div
            class="flex h-10 w-10 items-center justify-center rounded-xl bg-blue-600 text-white shadow-lg shadow-blue-200"
          >
            <i class="fas fa-vault text-lg"></i>
          </div>
          <span class="text-2xl font-extrabold tracking-tight text-slate-900"
            >finBoard</span
          >
        </div>

        <div class="hidden items-center gap-8 md:flex">
          <a
            href="posts.html"
            class="text-sm font-semibold text-slate-500 hover:text-blue-600"
            >커뮤니티</a
          >
          <a
            href="dashboard.html"
            class="text-sm font-semibold text-slate-500 hover:text-blue-600"
            >대시보드</a
          >
          <a href="home-finder" class="text-sm font-semibold text-blue-600"
            >홈 파인더</a
          >
          <div class="h-4 w-px bg-slate-200"></div>
          <button
            id="logoutButton"
            class="rounded-full border border-red-100 px-4 py-2 text-sm font-semibold text-red-500 transition hover:bg-red-50"
          >
            로그아웃
          </button>
        </div>
      </div>
    </nav>

    <main class="mx-auto max-w-[1600px] px-6 pt-10">
      <div class="flex flex-col gap-8 lg:flex-row">
        <aside class="w-full shrink-0 space-y-6 lg:w-[380px]">
          <div class="bento-card p-8 shadow-sm">
            <div class="space-y-8">
              <div>
                <label
                  class="text-[11px] font-black uppercase tracking-widest text-blue-500"
                  >Current Asset</label
                >
                <div class="relative mt-3">
                  <input
                    id="asset-input"
                    type="number"
                    value="15000"
                    class="w-full rounded-2xl border border-slate-100 bg-slate-50 px-5 py-4 text-xl font-extrabold outline-none focus:bg-white focus:ring-4 focus:ring-blue-50"
                  />
                  <span
                    class="absolute right-5 top-1/2 -translate-y-1/2 font-bold text-slate-400"
                    >만원</span
                  >
                </div>
              </div>

              <div>
                <label
                  class="text-[11px] font-black uppercase tracking-widest text-emerald-500"
                  >Monthly Income</label
                >
                <div class="relative mt-3">
                  <input
                    id="income-input"
                    type="number"
                    value="420"
                    class="w-full rounded-2xl border border-slate-100 bg-slate-50 px-5 py-4 text-xl font-extrabold outline-none focus:bg-white focus:ring-4 focus:ring-emerald-50"
                  />
                  <span
                    class="absolute right-5 top-1/2 -translate-y-1/2 font-bold text-slate-400"
                    >만원</span
                  >
                </div>
              </div>

              <div class="rounded-3xl bg-slate-50 p-6">
                <div class="flex items-center justify-between">
                  <label
                    class="text-[11px] font-black uppercase tracking-widest text-slate-400"
                    >Saving Ratio</label
                  >
                  <span id="save-val" class="text-lg font-black text-blue-600"
                    >35%</span
                  >
                </div>
                <input
                  id="save-slider"
                  type="range"
                  min="10"
                  max="80"
                  value="35"
                  class="mt-4 h-2 w-full cursor-pointer appearance-none rounded-full bg-slate-200 accent-blue-600"
                />
                <div
                  class="mt-4 flex justify-between text-xs font-bold text-slate-400"
                >
                  <span>월 저축액</span>
                  <span id="save-amount" class="text-slate-900">147만원</span>
                </div>
              </div>

              <div>
                <label
                  class="text-[11px] font-black uppercase tracking-widest text-amber-500"
                  >Loan Interest Rate</label
                >
                <div class="relative mt-3">
                  <input
                    id="interest-input"
                    type="number"
                    step="0.1"
                    value="3.5"
                    class="w-full rounded-2xl border border-slate-100 bg-slate-50 px-5 py-4 text-xl font-extrabold outline-none focus:bg-white focus:ring-4 focus:ring-amber-50"
                  />
                  <span
                    class="absolute right-5 top-1/2 -translate-y-1/2 font-bold text-slate-400"
                    >%</span
                  >
                </div>
              </div>

              <button
                id="updateButton"
                class="btn-gradient w-full rounded-2xl py-5 text-lg font-bold text-white shadow-lg shadow-blue-100 transition hover:scale-[1.02]"
              >
                분석 데이터 업데이트
              </button>
            </div>
          </div>
        </aside>

        <div class="flex-1 space-y-8">
          <div class="bento-card relative h-[550px] overflow-hidden shadow-sm">
            <div id="map" class="h-full w-full"></div>
            <div
              class="absolute left-6 top-6 z-[400] rounded-2xl bg-white/90 px-5 py-3 shadow-xl backdrop-blur-md border border-white"
            >
              <p
                class="text-[10px] font-black uppercase tracking-widest text-slate-400"
              >
                Market Explorer
              </p>
              <h3 class="text-lg font-bold text-slate-900">
                서울 주요 아파트 단지
              </h3>
            </div>
          </div>

          <div class="grid gap-8 xl:grid-cols-2">
            <section class="bento-card p-8">
              <div class="mb-6 flex items-start justify-between">
                <div>
                  <h3
                    id="prop-name"
                    class="text-2xl font-extrabold text-slate-900"
                  >
                    매물을 선택하세요
                  </h3>
                  <p
                    id="prop-area"
                    class="mt-1 text-sm font-semibold text-slate-400"
                  >
                    지도의 마커를 클릭하면 상세 리포트가 생성됩니다.
                  </p>
                </div>
                <span
                  id="prop-status"
                  class="rounded-full bg-blue-50 px-4 py-2 text-[11px] font-black text-blue-500 uppercase"
                  >Standby</span
                >
              </div>

              <div class="overflow-hidden rounded-[2rem] mb-6">
                <img
                  id="prop-img"
                  src="https://images.unsplash.com/photo-1460317442991-0ec209397118?auto=format&fit=crop&w=1200&q=80"
                  class="h-48 w-full object-cover"
                />
              </div>

              <div class="grid grid-cols-2 gap-4">
                <div class="rounded-3xl bg-slate-50 p-5">
                  <p
                    class="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-1"
                  >
                    Price
                  </p>
                  <p id="prop-price" class="text-xl font-black text-slate-900">
                    -
                  </p>
                </div>
                <div class="rounded-3xl bg-slate-50 p-5">
                  <p
                    class="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-1"
                  >
                    Target Period
                  </p>
                  <p
                    id="target-period"
                    class="text-xl font-black text-blue-600"
                  >
                    -
                  </p>
                </div>
              </div>

              <div class="mt-6">
                <div
                  class="flex justify-between text-xs font-bold text-slate-500 mb-2"
                >
                  <span>자산 도달률</span>
                  <span id="readiness-percent">0%</span>
                </div>
                <div
                  class="h-2.5 w-full bg-slate-100 rounded-full overflow-hidden"
                >
                  <div
                    id="readiness-bar"
                    class="progress-fill h-full bg-blue-600 transition-all duration-1000"
                    style="width: 0%"
                  ></div>
                </div>
              </div>

              <div
                class="mt-6 rounded-3xl bg-blue-50/50 p-5 border border-blue-100/50"
              >
                <p class="text-sm font-bold text-blue-900">
                  <i class="fas fa-lightbulb mr-2 text-blue-500"></i>AI 구매
                  전략
                </p>
                <p
                  id="prop-tip"
                  class="mt-2 text-sm leading-relaxed text-blue-800/80 italic"
                >
                  데이터를 불러오는 중입니다.
                </p>
              </div>
            </section>

            <section class="bento-card p-8">
              <h3 class="text-2xl font-extrabold text-slate-900 mb-6">
                Growth Simulation
              </h3>
              <div class="h-[280px] w-full rounded-2xl bg-white">
                <canvas id="priceChart"></canvas>
              </div>

              <div class="mt-8 grid grid-cols-2 gap-4">
                <div class="border border-slate-100 rounded-3xl p-5">
                  <p
                    class="text-[10px] font-black uppercase tracking-widest text-red-400 mb-1"
                  >
                    Shortfall
                  </p>
                  <p id="shortfall" class="text-lg font-black text-slate-900">
                    -
                  </p>
                </div>
                <div class="border border-slate-100 rounded-3xl p-5">
                  <p
                    class="text-[10px] font-black uppercase tracking-widest text-emerald-500 mb-1"
                  >
                    Monthly Save
                  </p>
                  <p
                    id="monthly-save"
                    class="text-lg font-black text-slate-900"
                  >
                    -
                  </p>
                </div>
              </div>

              <div
                class="mt-4 border border-slate-100 rounded-3xl p-5 bg-slate-50/50"
              >
                <p
                  class="text-[10px] font-black uppercase tracking-widest text-amber-500 mb-1"
                >
                  Expected Loan Cost
                </p>
                <p id="loan-cost" class="text-lg font-black text-slate-900">
                  -
                </p>
                <p class="mt-1 text-[10px] text-slate-400 font-bold">
                  원리금 균등 상환 30년 기준
                </p>
              </div>
            </section>
          </div>
        </div>
      </div>
    </main>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/home-finder.js"></script>
    <script>
      // 로그아웃 기능 추가 연동
      document.getElementById("logoutButton")?.addEventListener("click", () => {
        localStorage.clear();
        location.href = "index.html";
      });
    </script>
  </body>
</html>
